name: Run Tests
# Trigger this workflow on every push or pull request to the main branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # Allows manual trigger from the Actions tab in the GitHub UI
  workflow_dispatch:

jobs:
  test:
    # Run the job on the latest Ubuntu virtual machine
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out the repository code
    - name: Checkout Code
      uses: actions/checkout@v4

    # Step 2: Set up the appropriate language environment (e.g., Node.js)
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20' # Specify your project's version
        cache: 'npm' # Optional: Caches dependencies for faster runs

    # Step 3: Install project dependencies
    - name: Install Dependencies
      run: npm ci

    # Step 4: Run the test command
    - name: Run Tests
      run: npm test
